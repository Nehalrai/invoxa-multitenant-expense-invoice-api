version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: invoxa-postgres
    environment:
      POSTGRES_DB: invoxa
      POSTGRES_USER: invoxa_user
      POSTGRES_PASSWORD: invoxa_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: invoxa-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres_data: