spring:
  application:
    name: Invoxa

  datasource:
    url: jdbc:postgresql://localhost:5432/invoxa?TimeZone=UTC
    username: invoxa_user
    password: invoxa_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
jwt:
  secret: "ThisIsADevOnlySecretKeyChangeMe1234567890ABCDEF"
  expiration-ms: 86400000
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
invoxa:
  rabbitmq:
    queues:
      invoice-jobs: invoice.jobs
