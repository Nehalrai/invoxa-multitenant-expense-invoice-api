spring:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

invoxa:
  rabbitmq:
    queues:
      invoice-jobs: invoice.jobs

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info